<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/contact.css') }}">
</head>
<body>

<div class="contact-card">

    <form class="form" method="POST" action="{{ url_for('contact') }}">
        <p id="contact-heading">Contáctame</p>

        <div class="field">
            <svg class="input-icon" viewBox="0 0 16 16"><path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0zm4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4zm-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.029 10 8 10c-2.029 0-3.516.68-4.168 1.332-.678.678-.83 1.418-.832 1.664h10z"/></svg>
            <input type="text" name="name" class="input-field" placeholder="Nombre completo" required />
        </div>

        <div class="field">
            <svg class="input-icon" viewBox="0 0 16 16"><path d="M0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V4zm2-1a1 1 0 0 0-1 1v.217l7 4.2 7-4.2V4a1 1 0 0 0-1-1H2zm13 2.383-4.708 2.825L15 11.105V5.383zm-.034 6.876-5.64-3.471L8 9.583l-1.326-.795-5.64 3.47A1 1 0 0 0 2 13h12a1 1 0 0 0 .966-.741zM1 11.105l4.708-2.897L1 5.383v5.722z"/></svg>
            <input type="email" name="email" class="input-field" placeholder="Correo electrónico" required />
        </div>

        <div class="field textarea-field">
            <svg class="input-icon" viewBox="0 0 16 16"><path d="M2.678 11.894a1 1 0 0 1 .287.801 10.97 10.97 0 0 1-.398 2c1.395-.323 2.247-.697 2.634-.893a1 1 0 0 1 .71-.074A8.06 8.06 0 0 0 8 14c3.996 0 7-2.807 7-6 0-3.192-3.004-6-7-6S1 4.808 1 8c0 1.468.617 2.83 1.678 3.894zm-1.115 1.47C.999 14.352.666 15.798 1.23 16.164c.535.35 1.938-.323 3.395-1.09A9.01 9.01 0 0 0 8 15.5C12.418 15.5 16 12.08 16 8s-3.582-7.5-8-7.5C3.582.5 0 3.92 0 8c0 1.768.658 3.386 1.74 4.658l-.177.706z"/></svg>
            <textarea name="message" class="input-field textarea" placeholder="Escribe tu mensaje aquí..." required></textarea>
        </div>

        <button type="submit" class="submit-btn">Enviar mensaje</button>
    </form>
</div>



</body>
</html>
