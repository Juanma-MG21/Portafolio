<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi portafolio - Juan Medina</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
</head>
<body>
    <header class="left-column">
        <div class="gen">
            <h1>Juan Medina</h1>
            <h2>Desarrolador de software</h2>
            <p>Transformando ideas complejas en experiencias digitales fluidas. Descubre cómo construyo mi futuro, línea a línea.</p>
        </div>
        
        <div class="nav-links"> 
            <ul>
                <li><a href="#about"><span class="line">ABOUT ME</span></a></li>
                <li><a href="#projects"><span class="line">PERSONAL PROJECTS</span></a></li>
            </ul>
        </div>
        
        <footer class="social-links">
            <div class="icon-box">
                <a href="https://www.linkedin.com/in/juan-medina-330aa5353" target="_blank" rel="noopener">
                    <img src="{{ url_for('static', filename='img/icon_linkdin.png') }}" alt="LinkedIn" class="round-icon">
                </a>
                <span class="tooltip">LinkedIn</span>
            </div>

            <div class="icon-box">
                <a href="https://github.com/Juanma-MG21" target="_blank" rel="noopener">
                    <img src="{{ url_for('static', filename='img/icon_github.png') }}" alt="GitHub" class="round-icon">
                </a>
                <span class="tooltip">GitHub</span>
            </div>

            <div class="icon-box">
                <a href="https://www.instagram.com/juanmag2107/" target="_blank" rel="noopener">
                    <img src="{{ url_for('static', filename='img/icon_instagram.jpeg') }}" alt="Instagram" class="round-icon">
                </a>
                <span class="tooltip">Instagram</span>
            </div>           
        </footer>
    </header>

    <main class="right-column">

        <section id="about">
            {% include 'includes/about.html' %}
        </section>

        <section id="projects">
            {%include 'includes/projects.html' %}
        </section>

    </main>
<script>
document.addEventListener('DOMContentLoaded', () => {
    const sections = document.querySelectorAll('section[id]'); // Detecta tus IDs: about, projects, etc.
    const navLinks = document.querySelectorAll('.nav-links a');

    const observerOptions = {
        root: null,
        rootMargin: '0px',
        threshold: 0.5 // Se activa cuando el 50% de la sección es visible
    };

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                const id = entry.target.getAttribute('id');
                
                // Quitamos 'active' de todos y se lo damos al actual
                navLinks.forEach(link => {
                    link.classList.remove('active');
                    if (link.getAttribute('href') === `#${id}`) {
                        link.classList.add('active');
                    }
                });
            }
        });
    }, observerOptions);

    sections.forEach(section => observer.observe(section));
});
</script>

</body>
</html>
